<!DOCTYPE html>
<html>
<head>
<title>Student Registration Form</title>

<style>

body{
font-family:Arial;
background:linear-gradient(to right,#74ebd5,#ACB6E5);
margin:0;
padding:0;
}

.container{
width:500px;
margin:60px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

h2{
text-align:center;
color:#333;
}

.row{
margin-bottom:12px;
}

label{
font-weight:bold;
display:block;
margin-bottom:5px;
}

input,select,textarea{
width:100%;
padding:7px;
border-radius:5px;
border:1px solid gray;
}

.gender input{
width:auto;
}

.hobby input{
width:auto;
}

button{
display:block;
margin:20px auto;
padding:10px 25px;
background-color:#4CAF50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

button:hover{
background-color:#2e8b57;
}

</style>
</head>

<body>

<div class="container">

<h2>Student Registration Form</h2>

<form>

<div class="row">
<label>Name</label>
<input type="text" placeholder="Enter your name">
</div>

<div class="row">
<label>Email</label>
<input type="email" placeholder="Enter your email">
</div>

<div class="row">
<label>Mobile Number</label>
<input type="tel" placeholder="Enter mobile number">
</div>

<div class="row gender">
<label>Gender</label>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
</div>

<div class="row">
<label>Date of Birth</label>
<input type="date">
</div>

<div class="row">
<label>Department</label>
<select>
<option>CSE</option>
<option>IT</option>
<option>ECE</option>
<option>Mechanical</option>
</select>
</div>

<div class="row hobby">
<label>Hobbies</label>
<input type="checkbox"> Music
<input type="checkbox"> Sports
<input type="checkbox"> Reading
</div>

<div class="row">
<label>Address</label>
<textarea rows="4" placeholder="Enter your address"></textarea>
</div>

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
